  <!-- Bar chart inside iris -->
  <rect x="50" y="58" width="4" height="12" fill="#f5f2ed" rx="1"/>
  <rect x="56" y="52" width="4" height="18" fill="#c0392b" rx="1"/>
  <rect x="62" y="46" width="4" height="24" fill="#f5f2ed" rx="1"/>
