<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Outer scan ring -->
  <circle cx="55" cy="60" r="32" fill="none" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="4 3"/>
  <!-- Inner scan ring -->
  <circle cx="55" cy="60" r="22" fill="none" stroke="#c0392b" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- Iris pattern - concentric arcs -->
  <path d="M38,45 Q55,35 72,45" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M35,52 Q55,40 75,52" fill="none" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>
  <path d="M35,68 Q55,80 75,68" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M38,75 Q55,85 72,75" fill="none" stroke="#1a1a1a" stroke-width="1.2" opacity="0.6"/>
  <!-- Pupil -->
  <circle cx="55" cy="60" r="10" fill="#c0392b"/>
  <!-- Data scan lines through pupil -->
  <line x1="46" y1="57" x2="64" y2="57" stroke="#f5f2ed" stroke-width="0.8" opacity="0.6"/>
  <line x1="46" y1="60" x2="64" y2="60" stroke="#f5f2ed" stroke-width="0.8" opacity="0.8"/>
  <line x1="46" y1="63" x2="64" y2="63" stroke="#f5f2ed" stroke-width="0.8" opacity="0.6"/>
  <!-- Corner brackets (scan frame) -->
  <path d="M20,30 L20,25 L25,25" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M90,30 L90,25 L85,25" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M20,90 L20,95 L25,95" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <path d="M90,90 L90,95 L85,95" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Text -->
  <text x="115" y="55" font-family="'IBM Plex Mono', monospace" font-size="30" font-weight="500" fill="#1a1a1a">OPTIC</text>
  <text x="115" y="85" font-family="'IBM Plex Mono', monospace" font-size="30" font-weight="500" fill="#c0392b">RANK</text>
</svg>