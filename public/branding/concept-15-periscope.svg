<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Periscope body -->
  <rect x="45" y="30" width="16" height="70" rx="3" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Top viewport -->
  <rect x="38" y="22" width="30" height="16" rx="3" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Lens at top -->
  <circle cx="42" cy="30" r="5" fill="#c0392b"/>
  <!-- Lens reflection -->
  <circle cx="40" cy="28" r="1.5" fill="#f5f2ed" opacity="0.5"/>
  <!-- Bottom viewport -->
  <rect x="38" y="88" width="30" height="14" rx="3" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="64" cy="95" r="4" fill="#1a1a1a"/>
  <!-- Water line -->
  <line x1="15" y1="70" x2="95" y2="70" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="6 4" opacity="0.3"/>
  <!-- Vision lines from top lens -->
  <line x1="37" y1="27" x2="15" y2="18" stroke="#c0392b" stroke-width="1" opacity="0.4"/>
  <line x1="37" y1="30" x2="15" y2="30" stroke="#c0392b" stroke-width="1" opacity="0.3"/>
  <line x1="37" y1="33" x2="15" y2="42" stroke="#c0392b" stroke-width="1" opacity="0.2"/>
  <!-- Text -->
  <text x="110" y="48" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="700" fill="#1a1a1a">OPTIC</text>
  <text x="112" y="48" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="700" fill="none" stroke="#1a1a1a" stroke-width="0.3">OPTIC</text>
  <text x="110" y="82" font-family="'Playfair Display', Georgia, serif" font-size="32" font-weight="700" fill="#c0392b">RANK</text>
  <!-- Subtitle -->
  <text x="110" y="98" font-family="'IBM Plex Sans', sans-serif" font-size="9" font-weight="400" letter-spacing="4" fill="#999">SEE WHAT OTHERS CAN'T</text>
</svg>