<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Fiber optic light trails going upward -->
  <path d="M30,95 Q35,60 55,30" fill="none" stroke="#c0392b" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M45,95 Q50,65 60,35" fill="none" stroke="#b8860b" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M60,95 Q60,70 65,40" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M75,95 Q70,72 70,45" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <!-- Light burst at top -->
  <circle cx="57" cy="28" r="8" fill="#c0392b" opacity="0.15"/>
  <circle cx="57" cy="28" r="4" fill="#c0392b" opacity="0.3"/>
  <circle cx="57" cy="28" r="2" fill="#c0392b"/>
  <!-- Convergence point glow -->
  <circle cx="62" cy="36" r="3" fill="#b8860b" opacity="0.2"/>
  <!-- Text -->
  <text x="110" y="48" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="900" fill="#1a1a1a" letter-spacing="2">OPTIC</text>
  <line x1="110" y1="58" x2="280" y2="58" stroke="#c0392b" stroke-width="1.5"/>
  <text x="110" y="82" font-family="'IBM Plex Sans', sans-serif" font-size="20" font-weight="300" letter-spacing="10" fill="#1a1a1a">RANK</text>
</svg>