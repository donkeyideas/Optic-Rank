<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Telescope body angled upward -->
  <rect x="30" y="38" width="50" height="18" rx="3" fill="#1a1a1a" transform="rotate(-25 55 47)"/>
  <!-- Telescope wider front lens -->
  <ellipse cx="28" cy="50" rx="8" ry="14" fill="none" stroke="#1a1a1a" stroke-width="2.5" transform="rotate(-25 28 50)"/>
  <!-- Eyepiece -->
  <rect x="78" y="42" width="14" height="12" rx="2" fill="#c0392b" transform="rotate(-25 85 48)"/>
  <!-- Tripod legs -->
  <line x1="55" y1="56" x2="35" y2="95" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="56" x2="60" y2="95" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="55" y1="56" x2="78" y2="90" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Stars/ranking dots in view -->
  <circle cx="15" cy="25" r="2" fill="#b8860b"/>
  <circle cx="8" cy="35" r="1.5" fill="#b8860b" opacity="0.6"/>
  <circle cx="22" cy="18" r="1" fill="#b8860b" opacity="0.4"/>
  <!-- Text -->
  <text x="115" y="52" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="700" fill="#1a1a1a">Optic</text>
  <text x="115" y="85" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="400" fill="#c0392b">Rank</text>
</svg>