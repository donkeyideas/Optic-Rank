<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Diamond/gem shape forming an eye -->
  <polygon points="55,20 90,50 55,100 20,50" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Facet lines -->
  <line x1="55" y1="20" x2="35" y2="50" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  <line x1="55" y1="20" x2="75" y2="50" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="50" x2="90" y2="50" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  <!-- Inner eye/pupil -->
  <ellipse cx="55" cy="55" rx="18" ry="12" fill="none" stroke="#c0392b" stroke-width="2"/>
  <circle cx="55" cy="55" r="6" fill="#c0392b"/>
  <!-- Light reflection -->
  <circle cx="52" cy="52" r="2" fill="#f5f2ed"/>
  <!-- Small sparkle -->
  <line x1="55" y1="14" x2="55" y2="10" stroke="#b8860b" stroke-width="1.5"/>
  <line x1="50" y1="16" x2="48" y2="13" stroke="#b8860b" stroke-width="1"/>
  <line x1="60" y1="16" x2="62" y2="13" stroke="#b8860b" stroke-width="1"/>
  <!-- Text -->
  <text x="110" y="50" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#1a1a1a" font-style="italic">Optic</text>
  <text x="110" y="82" font-family="'Playfair Display', Georgia, serif" font-size="34" font-weight="700" fill="#c0392b" font-style="italic">Rank</text>
</svg>