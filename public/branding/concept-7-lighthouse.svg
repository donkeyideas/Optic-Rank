<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Lighthouse body -->
  <polygon points="50,95 40,95 45,40 65,40 70,95 60,95" fill="none" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Lighthouse stripes -->
  <rect x="47" y="55" width="16" height="8" fill="#c0392b"/>
  <rect x="44" y="75" width="22" height="8" fill="#c0392b"/>
  <!-- Lighthouse top/lamp -->
  <rect x="48" y="32" width="14" height="10" fill="#1a1a1a" rx="2"/>
  <polygon points="46,32 64,32 58,24 52,24" fill="#1a1a1a"/>
  <!-- Light beam -->
  <polygon points="62,30 100,15 100,25" fill="#b8860b" opacity="0.3"/>
  <polygon points="62,34 100,35 100,45" fill="#b8860b" opacity="0.2"/>
  <!-- Light glow -->
  <circle cx="55" cy="36" r="5" fill="#b8860b" opacity="0.4"/>
  <!-- Signal waves -->
  <path d="M70,28 Q80,22 90,28" fill="none" stroke="#b8860b" stroke-width="1.5" opacity="0.5"/>
  <path d="M75,22 Q85,16 95,22" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.3"/>
  <!-- Text -->
  <text x="120" y="52" font-family="'Playfair Display', Georgia, serif" font-size="36" font-weight="700" fill="#1a1a1a">OPTIC</text>
  <text x="120" y="84" font-family="'IBM Plex Sans', sans-serif" font-size="22" font-weight="400" letter-spacing="6" fill="#b8860b">RANK</text>
</svg>