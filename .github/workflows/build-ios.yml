name: Build iOS (IPA)

# Local EAS build on a macOS runner — does NOT consume EAS Build credits.
# iOS signing certificates and provisioning profiles are pulled from EAS using
# EXPO_TOKEN, so we don't need to manage Apple secrets in GitHub.
#
# Note: macOS runner minutes count 10x against your free monthly quota.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      submit:
        description: "Auto-submit to TestFlight after build"
        required: true
        default: true
        type: boolean

defaults:
  run:
    working-directory: optic-rank-mobile

jobs:
  build:
    name: Build iOS ${{ github.event.inputs.profile }}
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: optic-rank-mobile/package-lock.json

      - name: List available Xcode versions
        run: ls -d /Applications/Xcode*.app 2>/dev/null || true

      - name: Select Xcode 26 (required by Expo SDK 55)
        run: |
          # Expo SDK 55 requires Xcode 26 — Xcode 16.x is not supported
          for ver in 26.3 26.2 26.1.1 26.1 26.0.1 26.0; do
            if [ -d "/Applications/Xcode_${ver}.app" ]; then
              echo "Using Xcode ${ver}"
              sudo xcode-select -s "/Applications/Xcode_${ver}.app/Contents/Developer"
              break
            fi
          done
          xcodebuild -version
          swift --version

      - name: Fix TMPDIR symlink
        run: |
          REAL_TMP=$(python3 -c "import os, tempfile; print(os.path.realpath(tempfile.gettempdir()))")
          echo "TMPDIR=$REAL_TMP" >> "$GITHUB_ENV"
        working-directory: .

      - name: Install npm dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS local build
        run: |
          eas build \
            --local \
            --non-interactive \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --output ${{ github.workspace }}/opticrank-${{ github.event.inputs.profile }}.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: opticrank-ios-${{ github.event.inputs.profile }}-${{ github.run_number }}
          path: ${{ github.workspace }}/opticrank-*.ipa
          retention-days: 14

      - name: Write App Store Connect API key
        if: ${{ github.event.inputs.submit == 'true' }}
        run: |
          mkdir -p ~/private_keys
          printf '%s' "$APPLE_API_KEY_P8" > ~/private_keys/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8
        working-directory: .
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Configure EAS submit with API key
        if: ${{ github.event.inputs.submit == 'true' }}
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          node -e "
            const fs = require('fs');
            const eas = JSON.parse(fs.readFileSync('eas.json', 'utf8'));
            eas.submit = eas.submit || {};
            eas.submit.production = eas.submit.production || {};
            eas.submit.production.ios = {
              ascAppId: '6760938335',
              ascApiKeyId: process.env.APPLE_API_KEY_ID,
              ascApiKeyIssuerId: process.env.APPLE_API_ISSUER_ID,
              ascApiKeyPath: process.env.HOME + '/private_keys/AuthKey_' + process.env.APPLE_API_KEY_ID + '.p8'
            };
            fs.writeFileSync('eas.json', JSON.stringify(eas, null, 2));
            console.log('Updated eas.json submit config:', JSON.stringify(eas.submit, null, 2));
          "

      - name: Submit to TestFlight
        if: ${{ github.event.inputs.submit == 'true' }}
        run: |
          eas submit \
            --platform ios \
            --path ${{ github.workspace }}/opticrank-${{ github.event.inputs.profile }}.ipa \
            --non-interactive
