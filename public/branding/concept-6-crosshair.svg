<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Outer scope ring -->
  <circle cx="55" cy="60" r="30" fill="none" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Inner scope ring -->
  <circle cx="55" cy="60" r="15" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Crosshair lines -->
  <line x1="55" y1="22" x2="55" y2="42" stroke="#c0392b" stroke-width="2"/>
  <line x1="55" y1="78" x2="55" y2="98" stroke="#c0392b" stroke-width="2"/>
  <line x1="17" y1="60" x2="37" y2="60" stroke="#c0392b" stroke-width="2"/>
  <line x1="73" y1="60" x2="93" y2="60" stroke="#c0392b" stroke-width="2"/>
  <!-- Center dot -->
  <circle cx="55" cy="60" r="3" fill="#c0392b"/>
  <!-- Small ranking bars at center top -->
  <rect x="49" y="49" width="3" height="6" fill="#1a1a1a" rx="0.5"/>
  <rect x="53" y="47" width="3" height="8" fill="#c0392b" rx="0.5"/>
  <rect x="57" y="45" width="3" height="10" fill="#1a1a1a" rx="0.5"/>
  <!-- Text -->
  <text x="115" y="50" font-family="'IBM Plex Sans', sans-serif" font-size="30" font-weight="600" letter-spacing="3" fill="#1a1a1a">OPTIC</text>
  <text x="115" y="82" font-family="'IBM Plex Sans', sans-serif" font-size="30" font-weight="300" letter-spacing="3" fill="#c0392b">RANK</text>
</svg>