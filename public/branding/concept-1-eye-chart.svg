  <circle cx="54" cy="54" r="3" fill="rgba(245,242,237,0.3)"/>
  <!-- Text -->
  <text x="110" y="55" font-family="'Playfair Display', Georgia, serif" font-size="38" font-weight="700" fill="#1a1a1a">OPTIC</text>
  <text x="110" y="85" font-family="'IBM Plex Sans', sans-serif" font-size="24" font-weight="300" letter-spacing="8" fill="#c0392b">RANK</text>
