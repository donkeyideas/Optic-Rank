<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Magnifying glass -->
  <circle cx="55" cy="50" r="25" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Handle -->
  <line x1="73" y1="68" x2="95" y2="90" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
  <!-- Upward arrow inside lens -->
  <polygon points="55,30 65,45 60,45 60,60 50,60 50,45 45,45" fill="#c0392b"/>
  <!-- Small ranking lines -->
  <line x1="40" y1="65" x2="70" y2="65" stroke="#1a1a1a" stroke-width="1.5" opacity="0.3"/>
  <line x1="42" y1="70" x2="68" y2="70" stroke="#1a1a1a" stroke-width="1.5" opacity="0.2"/>
  <!-- Text -->
  <text x="115" y="55" font-family="'Playfair Display', Georgia, serif" font-size="38" font-weight="700" fill="#1a1a1a">OPTIC</text>
  <text x="115" y="85" font-family="'IBM Plex Sans', sans-serif" font-size="24" font-weight="300" letter-spacing="8" fill="#c0392b">RANK</text>
</svg>