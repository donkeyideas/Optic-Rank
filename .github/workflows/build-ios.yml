name: Build iOS (IPA)

# Local EAS build on a macOS runner — does NOT consume EAS Build credits.
# iOS signing certificates and provisioning profiles are pulled from EAS using
# EXPO_TOKEN, so we don't need to manage Apple secrets in GitHub.
#
# Note: macOS runner minutes count 10x against your free monthly quota.

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS build profile"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - preview
      submit:
        description: "Auto-submit to TestFlight after build"
        required: true
        default: true
        type: boolean

defaults:
  run:
    working-directory: optic-rank-mobile

jobs:
  build:
    name: Build iOS ${{ github.event.inputs.profile }}
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: optic-rank-mobile/package-lock.json

      - name: List available Xcode versions
        run: ls /Applications | grep -i xcode || true

      - name: Pin Xcode 16
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Available Xcode versions:"
            ls /Applications | grep -i xcode || true
            echo "::warning::No Xcode 16.x found, using default"
          else
            echo "Using $XCODE_PATH"
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          xcodebuild -version

      - name: Fix TMPDIR symlink
        run: |
          REAL_TMP=$(python3 -c "import os; print(os.path.realpath(os.environ.get('TMPDIR', '/tmp')))")
          echo "TMPDIR=$REAL_TMP" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Run EAS local build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p build
          eas build \
            --local \
            --non-interactive \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --output ./build/opticrank-${{ github.event.inputs.profile }}.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: opticrank-ios-${{ github.event.inputs.profile }}-${{ github.run_number }}
          path: optic-rank-mobile/build/*.ipa
          retention-days: 14

      - name: Decode App Store Connect API key
        if: ${{ github.event.inputs.submit == 'true' }}
        env:
          APPLE_ASC_KEY_P8_BASE64: ${{ secrets.APPLE_ASC_KEY_P8_BASE64 }}
        run: |
          if [ -z "$APPLE_ASC_KEY_P8_BASE64" ]; then
            echo "::error::Missing secret APPLE_ASC_KEY_P8_BASE64"
            exit 1
          fi
          echo "$APPLE_ASC_KEY_P8_BASE64" | base64 --decode > asc-api-key.p8

      - name: Submit to TestFlight
        if: ${{ github.event.inputs.submit == 'true' }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas submit \
            --non-interactive \
            --platform ios \
            --profile ${{ github.event.inputs.profile }} \
            --path ./build/opticrank-${{ github.event.inputs.profile }}.ipa
