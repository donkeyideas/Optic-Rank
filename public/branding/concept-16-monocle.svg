<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <!-- Monocle lens -->
  <circle cx="55" cy="50" r="28" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <!-- Inner ring detail -->
  <circle cx="55" cy="50" r="23" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>
  <!-- Chain hanging down -->
  <path d="M75,68 Q82,80 78,95" fill="none" stroke="#b8860b" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M78,95 Q76,100 80,102" fill="none" stroke="#b8860b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Lens glare -->
  <path d="M40,38 Q48,32 56,38" fill="none" stroke="#f5f2ed" stroke-width="2" opacity="0.3"/>
  <!-- Small chart inside monocle -->
  <rect x="43" y="52" width="5" height="14" fill="#1a1a1a" opacity="0.3" rx="1"/>
  <rect x="50" y="46" width="5" height="20" fill="#c0392b" opacity="0.6" rx="1"/>
  <rect x="57" y="40" width="5" height="26" fill="#1a1a1a" opacity="0.3" rx="1"/>
  <rect x="64" y="36" width="5" height="30" fill="#c0392b" opacity="0.4" rx="1"/>
  <!-- Text - very editorial -->
  <text x="105" y="42" font-family="'Playfair Display', Georgia, serif" font-size="16" font-weight="400" letter-spacing="8" fill="#1a1a1a">THE</text>
  <text x="105" y="72" font-family="'Playfair Display', Georgia, serif" font-size="38" font-weight="900" fill="#1a1a1a">OPTIC</text>
  <text x="105" y="98" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="400" letter-spacing="6" fill="#c0392b">RANK</text>
</svg>